name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Don't run two CI runs for the same branch in parallel; the latest push wins.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        # Tests use a fake `browser_use` module via monkeypatch, so we skip the
        # ~600MB transitive install (browser-use, anthropic, openai, etc.) and
        # only install what tests actually exercise. `--no-deps` keeps the
        # editable install of `recallo` lean. `httpx` and `trafilatura` are
        # imported at module load time by `recallo.ingestor`, so they have to
        # be present even though no test calls them.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio click sqlite-vec httpx trafilatura openai
          python -m pip install -e . --no-deps

      - name: Install pysqlite3-binary (Linux only)
        # actions/setup-python's stdlib sqlite3 on macOS lacks
        # loadable-extension support, but pysqlite3-binary has no
        # macOS-arm64 wheel (macos-latest is M-series). On Linux we install
        # it as belt-and-braces; on Windows the stdlib already supports
        # extensions; on macOS the vec tests gracefully skip themselves.
        if: runner.os == 'Linux'
        run: python -m pip install pysqlite3-binary

      - name: Run pytest
        run: pytest -v

  lint:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: python -m pip install ruff

      - name: Lint recallo + tests
        run: ruff check recallo tests
